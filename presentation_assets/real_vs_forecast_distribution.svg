<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Comparacao direta entre real e previsoes</title>
  <desc id="desc">Tabela visual com media, mediana, percentil 75 e maximo do volume real e das previsoes dos fornecedores.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="52" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Real x previsoes</text>
  <text x="52" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">Antes das metricas, a estatistica descritiva ja mostra o perfil de cada fornecedor</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
    <rect x="60" y="116" width="800" height="286" rx="8" fill="#ffffff" stroke="#d0d5dd"/>
    <rect x="60" y="116" width="800" height="48" rx="8" fill="#f8fafc"/>
    <text x="92" y="146" font-weight="800" fill="#172033">Serie</text>
    <text x="278" y="146" font-weight="800" text-anchor="end" fill="#172033">Media</text>
    <text x="418" y="146" font-weight="800" text-anchor="end" fill="#172033">Mediana</text>
    <text x="558" y="146" font-weight="800" text-anchor="end" fill="#172033">P75</text>
    <text x="742" y="146" font-weight="800" text-anchor="end" fill="#172033">Maximo</text>
    <line x1="60" y1="164" x2="860" y2="164" stroke="#d0d5dd"/>
    <text x="92" y="205" fill="#475467">Volume real</text><text x="278" y="205" text-anchor="end" fill="#172033">88,59</text><text x="418" y="205" text-anchor="end" fill="#172033">32,00</text><text x="558" y="205" text-anchor="end" fill="#172033">78,00</text><text x="742" y="205" text-anchor="end" fill="#172033">27.912</text>
    <line x1="60" y1="226" x2="860" y2="226" stroke="#eaecf0"/>
    <text x="92" y="267" fill="#2f80ed" font-weight="800">Forn. 01</text><text x="278" y="267" text-anchor="end" fill="#172033">94,11</text><text x="418" y="267" text-anchor="end" fill="#172033">36,00</text><text x="558" y="267" text-anchor="end" fill="#172033">84,00</text><text x="742" y="267" text-anchor="end" fill="#172033">25.560</text>
    <line x1="60" y1="288" x2="860" y2="288" stroke="#eaecf0"/>
    <text x="92" y="329" fill="#f59e0b" font-weight="800">Forn. 02</text><text x="278" y="329" text-anchor="end" fill="#172033">95,45</text><text x="418" y="329" text-anchor="end" fill="#172033">30,00</text><text x="558" y="329" text-anchor="end" fill="#172033">84,00</text><text x="742" y="329" text-anchor="end" fill="#172033">27.512</text>
    <line x1="60" y1="350" x2="860" y2="350" stroke="#eaecf0"/>
    <text x="92" y="391" fill="#12b76a" font-weight="800">Forn. 03</text><text x="278" y="391" text-anchor="end" fill="#172033">150,40</text><text x="418" y="391" text-anchor="end" fill="#172033">45,73</text><text x="558" y="391" text-anchor="end" fill="#172033">117,31</text><text x="742" y="391" text-anchor="end" fill="#d92d20" font-weight="900">220.306,61</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="60" y="430" width="800" height="54" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="82" y="463" font-size="14" fill="#92400e">Leitura: Forn. 01 fica mais perto do real; Forn. 02 subestima baixos volumes; Forn. 03 infla previsoes e cria extremos.</text>
  </g>
</svg>
