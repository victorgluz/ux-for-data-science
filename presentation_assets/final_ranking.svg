<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Ranking final ponderado</title>
  <desc id="desc">Score final dos fornecedores: Fornecedor 01 com 0,90, Fornecedor 02 com 0,68 e Fornecedor 03 com 0,10.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="52" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Score ponderado final</text>
  <text x="52" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">Pesos: FA global 30%, Classe A 25%, Campanha 20%, Top-20 15%, Consistencia 10%</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="170" y="140" width="580" height="64" rx="8" fill="#eaf3ff" stroke="#2f80ed"/>
    <rect x="170" y="232" width="438" height="64" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <rect x="170" y="324" width="64" height="64" rx="8" fill="#ecfdf3" stroke="#12b76a"/>
    <text x="88" y="180" font-size="17" font-weight="800" fill="#172033">Forn. 01</text>
    <text x="88" y="272" font-size="17" font-weight="800" fill="#172033">Forn. 02</text>
    <text x="88" y="364" font-size="17" font-weight="800" fill="#172033">Forn. 03</text>
    <text x="774" y="180" font-size="26" font-weight="900" fill="#172033">0,90</text>
    <text x="632" y="272" font-size="26" font-weight="900" fill="#172033">0,68</text>
    <text x="260" y="364" font-size="26" font-weight="900" fill="#172033">0,10</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="52" y="438" width="816" height="44" rx="8" fill="#f8fafc" stroke="#d0d5dd"/>
    <text x="72" y="466" font-size="14" fill="#475467">Vencedor: Fornecedor 01 combina melhor acuracia, desempenho em itens criticos e risco operacional controlado.</text>
  </g>
</svg>
