<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Metricas globais por fornecedor</title>
  <desc id="desc">Comparacao de FA, WAPE e Bias para os tres fornecedores.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="52" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Metricas globais</text>
  <text x="52" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">FA maior e WAPE menor indicam previsao mais aderente ao volume real</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#667085">
    <text x="88" y="424">Forn. 01</text>
    <text x="210" y="424">Forn. 02</text>
    <text x="332" y="424">Forn. 03</text>
    <text x="510" y="424">Forn. 01</text>
    <text x="632" y="424">Forn. 02</text>
    <text x="754" y="424">Forn. 03</text>
  </g>
  <line x1="70" y1="390" x2="420" y2="390" stroke="#98a2b3"/>
  <line x1="492" y1="390" x2="842" y2="390" stroke="#98a2b3"/>
  <text x="70" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">Forecast Accuracy</text>
  <text x="492" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">Bias global</text>
  <g>
    <rect x="92" y="254" width="70" height="136" rx="5" fill="#2f80ed"/>
    <rect x="214" y="306" width="70" height="84" rx="5" fill="#f59e0b"/>
    <rect x="336" y="388" width="70" height="2" rx="1" fill="#12b76a"/>
    <text x="127" y="242" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">45%</text>
    <text x="249" y="294" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">28%</text>
    <text x="371" y="374" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">0%</text>
  </g>
  <g>
    <rect x="514" y="365" width="70" height="25" rx="5" fill="#2f80ed"/>
    <rect x="636" y="356" width="70" height="34" rx="5" fill="#f59e0b"/>
    <rect x="758" y="110" width="70" height="280" rx="5" fill="#12b76a"/>
    <text x="549" y="353" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">+6%</text>
    <text x="671" y="344" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">+8%</text>
    <text x="793" y="98" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#172033">+70%</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#475467">
    <text x="70" y="468">RMSE: Forn. 01 = 200,38 | Forn. 02 = 219,89 | Forn. 03 = 751,48</text>
  </g>
