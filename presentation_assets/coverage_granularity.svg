<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Granularidade e cobertura da base</title>
  <desc id="desc">Resumo de lojas, estados, materiais, meses, densidade e completude das combinacoes loja-material.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="52" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Granularidade e cobertura</text>
  <text x="52" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">A base e grande, mas nao cobre todas as combinacoes loja-material em todos os meses</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="70" y="124" width="178" height="116" rx="8" fill="#eaf3ff" stroke="#2f80ed"/>
    <rect x="270" y="124" width="178" height="116" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <rect x="470" y="124" width="178" height="116" rx="8" fill="#ecfdf3" stroke="#12b76a"/>
    <rect x="670" y="124" width="178" height="116" rx="8" fill="#f8fafc" stroke="#98a2b3"/>
    <text x="159" y="174" text-anchor="middle" font-size="32" font-weight="900" fill="#172033">94</text>
    <text x="159" y="204" text-anchor="middle" font-size="14" fill="#475467">lojas</text>
    <text x="359" y="174" text-anchor="middle" font-size="32" font-weight="900" fill="#172033">16</text>
    <text x="359" y="204" text-anchor="middle" font-size="14" fill="#475467">estados</text>
    <text x="559" y="174" text-anchor="middle" font-size="32" font-weight="900" fill="#172033">196</text>
    <text x="559" y="204" text-anchor="middle" font-size="14" fill="#475467">materiais</text>
    <text x="759" y="174" text-anchor="middle" font-size="32" font-weight="900" fill="#172033">17</text>
    <text x="759" y="204" text-anchor="middle" font-size="14" fill="#475467">meses</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="70" y="304" font-size="16" font-weight="800" fill="#172033">Cobertura da matriz teorica</text>
    <rect x="70" y="332" width="630" height="34" rx="8" fill="#e4e7ec"/>
    <rect x="70" y="332" width="297" height="34" rx="8" fill="#2f80ed"/>
    <text x="382" y="356" font-size="18" font-weight="900" fill="#172033">47,2%</text>
    <text x="70" y="394" font-size="14" fill="#667085">147.713 linhas observadas de 313.208 combinacoes teoricas.</text>
    <text x="70" y="444" font-size="16" font-weight="800" fill="#172033">Completude loja-material</text>
    <rect x="332" y="420" width="368" height="34" rx="8" fill="#e4e7ec"/>
    <rect x="332" y="420" width="18" height="34" rx="8" fill="#12b76a"/>
    <text x="724" y="444" font-size="18" font-weight="900" fill="#172033">4,9%</text>
    <text x="70" y="482" font-size="14" fill="#667085">Apenas 508 combinacoes tem dados nos 17 meses; a mediana e 14 meses.</text>
  </g>
</svg>
